<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PAFHA — Plateforme d'Associations Franco-Haïtiennes</title>
    <div id="scroll-progress"></div>
    <script>
      // Global configuration and fixes for the sandbox environment
      (function() {
        // Filter out third-party extension errors (like MetaMask) to prevent false-positives
        window.addEventListener('error', function(event) {
          try {
            const message = event.message || '';
            const filename = event.filename || '';
            if (
              message.toLowerCase().includes('metamask') || 
              message.toLowerCase().includes('ethereum') || 
              filename.includes('chrome-extension') || 
              filename.includes('extension')
            ) {
              console.warn('Filtered third-party extension error:', message);
              event.stopImmediatePropagation();
              event.preventDefault();
              return true;
            }
          } catch (e) {}
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          try {
            const reason = event.reason;
            const message = (reason && (reason.message || reason.toString())) || '';
            if (
              message.toLowerCase().includes('metamask') || 
              message.toLowerCase().includes('ethereum') ||
              message.toLowerCase().includes('rpc')
            ) {
              console.warn('Filtered third-party promise rejection:', message);
              event.stopImmediatePropagation();
              event.preventDefault();
              return true;
            }
          } catch (e) {}
        }, true);

        // Fix for window.fetch in restricted environments
        try {
          const original = window.fetch;
          if (original) {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return original; },
              set: function(v) { /* Block override */ }
            });
          }
        } catch (e) {}

        // Global routing helper for "Virtual Pages" in a non-SPA native environment
        window.navigateTo = function(page, data = null) {
          window.dispatchEvent(new CustomEvent('pafha-navigate', { detail: { page, data } }));
          window.scrollTo(0, 0);
        };
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
